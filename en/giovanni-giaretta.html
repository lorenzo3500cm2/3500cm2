<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovanni Giaretta</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Libre Baskerville', serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #000;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            position: relative;
        }

        .back-link {
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: #333;
        }

        .back-link:hover {
            color: blue;
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 25px;
            height: 15px;
            cursor: pointer;
        }

        .menu-icon div {
            background-color: #000;
            height: 2px;
            width: 100%;
            border-radius: 1px;
        }

        .menu {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            padding: 0;
            background-color: #fff;
            z-index: 1000;
        }

        .menu a {
            display: block;
            padding: 10px 0;
            text-decoration: none;
            color: #000;
            font-size: 1rem;
            text-align: right;
        }

        .menu a:hover {
            background-color: transparent;
            text-decoration: underline;
        }

        img {
            width: 100%;
            max-height: 90vh;
            object-fit: contain;
            display: block;
            margin: 20px auto;
        }

        .description {
            font-family: 'Libre Baskerville', serif;
            font-size: 1rem;
            text-align: left;
            margin: 20px;
            color: #333;
        }

        .prev-artist,
        .next-artist {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: gray;
            text-decoration: none;
            z-index: 1000;
        }

        .prev-artist {
            left: 20px;
        }

        .next-artist {
            right: 20px;
        }

        .prev-artist:hover,
        .next-artist:hover {
            color: black;
        }

        @media screen and (max-width: 768px) {
            .back-link {
                font-size: 1.2rem;
            }

            .description {
                font-size: 0.9rem;
                margin: 16px;
            }

            .prev-artist,
            .next-artist {
                font-size: 1.6rem;
            }
        }
    </style>

    <script src="/en/menu.js" defer></script>
    <script src="/en/analytics.js"></script>
</head>

<body>
    <div class="header">
        <a href="/en/artists.html" class="back-link">#110 Giovanni Giaretta</a>

        <div class="menu-icon" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <!-- Hidden menu -->
    <div class="menu" id="menu">
        <a href="/en/artists.html">Artists</a>
        <a href="/en/3500cm2.html">3500 cm²</a>
        <a href="/en/places.html">Places</a>
        <a href="/en/projects.html">Projects</a>
        <a href="/en/news.html">News</a>
        <a href="/en/contacts.html">Contacts</a>
        <a href="/it/giovanni-giaretta.html" onclick="localStorage.setItem('siteLanguage', 'it')">IT</a>
    </div>

    <img src="/img/giovanni-giaretta.jpeg" alt="Giovanni Giaretta">

    <div class="description">
        © Giovanni Giaretta, <i>It takes a while to talk the long language of the rocks</i>, 2026, 3500 cm² #110, Città per la pace, Polo bibliotecario di Potenza, Potenza
    </div>

    <!-- Arrows to navigate between artist pages -->
    <a href="/en/mario-garcia-torres.html" class="prev-artist">&#8592;</a>
    <a href="/en/christoph-girardet.html" class="next-artist">&#8594;</a>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>

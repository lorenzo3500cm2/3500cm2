<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Libre Baskerville', serif;
            margin: 0;
            padding: 0;
            padding-top: 76px;
            background-color: #fff;
            color: #000;
            position: relative;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2000;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 30px;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            box-sizing: border-box;
        }

        .back-link {
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: #333;
            white-space: nowrap;
        }

        .back-link:hover {
            color: blue;
        }

        .menu-icon {
            display: none;
        }

        .menu {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 28px;

            position: static;
            padding: 0;
            margin: 0;
            background: transparent;
        }

        .menu a {
            display: inline-block;
            padding: 0;
            text-decoration: none;
            color: #000;
            font-size: 1rem;
            white-space: nowrap;
        }

        .menu a:hover {
            color: blue;
            text-decoration: underline;
        }

        img {
            width: 100%;
            max-height: 84vh;
            object-fit: contain;
            display: block;
            margin: 20px auto;
        }

        .description {
            font-family: 'Libre Baskerville', serif;
            font-size: 1rem;
            line-height: 1.5;
            text-align: left;
            margin: 20px;
            color: #333;
        }

        .description em {
            font-style: italic;
        }

        .prev-artist,
        .next-artist {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: gray;
            text-decoration: none;
            z-index: 1000;
        }

        .prev-artist {
            left: 20px;
        }

        .next-artist {
            right: 20px;
        }

        .prev-artist:hover,
        .next-artist:hover {
            color: black;
        }

        @media screen and (max-width: 768px) {
            body {
                padding-top: 125px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
                padding: 16px 20px;
            }

            .back-link {
                font-size: 1.25rem;
                white-space: normal;
            }

            .menu {
                flex-wrap: wrap;
                justify-content: flex-start;
                gap: 10px 18px;
            }

            .menu a {
                font-size: 0.9rem;
            }

            img {
                max-height: 76vh;
                margin-top: 15px;
            }

            .description {
                font-size: 0.9rem;
                margin: 18px 20px 30px 20px;
            }

            .prev-artist,
            .next-artist {
                font-size: 1.8rem;
            }

            .prev-artist {
                left: 12px;
            }

            .next-artist {
                right: 12px;
            }
        }
    </style>

    <script src="../analytics.js"></script>
</head>

<body>

    <div class="header">
        <a href="pagina.html" class="back-link">#114 Oliver Laric</a>

        #114 Oliver Laric, produced in 2026 for 3500 cm² on the occasion of <em>Expositio Mundi</em>, University of Macerata
    </div>

    <!-- Arrows to navigate between artist pages -->
    <a href="robert-kusmirowski.html" class="prev-artist">&#8592;</a>
    <a href="jochen-lempert.html" class="next-artist">&#8594;</a>

    <!-- Mobile swipe -->
    <script>
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const previousPage = "robert-kusmirowski.html";
        const nextPage = "jochen-lempert.html";

        document.addEventListener("touchstart", function(event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }, false);

        document.addEventListener("touchend", function(event) {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const swipeDistanceX = touchEndX - touchStartX;
            const swipeDistanceY = touchEndY - touchStartY;
            const minimumSwipe = 70;

            if (Math.abs(swipeDistanceY) > Math.abs(swipeDistanceX)) {
                return;
            }

            if (Math.abs(swipeDistanceX) < minimumSwipe) {
                return;
            }

            if (swipeDistanceX > 0) {
                window.location.href = previousPage;
            }

            if (swipeDistanceX < 0) {
                window.location.href = nextPage;
            }
        }
    </script>

</body>
</html>

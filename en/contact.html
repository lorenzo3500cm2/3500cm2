    /* Menu sempre visibile */
    .menu {

    .floating-instagram {
        position: absolute;
        left: 20px;
        top: 110px;
        font-size: 1.2rem;
        font-weight: bold;

    }

        color: #000;
        text-decoration: none;
    }

    .floating-instagram a:hover {
        text-decoration: underline;
        color: blue;
    }

    @keyframes moveDown {
        0% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(300px);
        }
        100% {
            transform: translateY(0);
        }
    }

    /* Mobile */
    @media (max-width: 768px) {

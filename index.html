<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3500 cm²</title>

  <script>
    (function () {
      const savedLanguage = localStorage.getItem("siteLanguage");

      if (savedLanguage === "it") {
        window.location.replace("/it/3500-cm2.html");
        return;
      }

      if (savedLanguage === "en") {
        window.location.replace("/en/3500-cm2.html");
        return;
      }

      const browserLanguage = navigator.language || navigator.userLanguage;

      if (browserLanguage && browserLanguage.toLowerCase().startsWith("it")) {
        window.location.replace("/it/3500-cm2.html");
      } else {
        window.location.replace("/en/3500-cm2.html");
      }
    })();
  </script>
</head>

<body>
  <noscript>
    <p>
      <a href="/it/3500-cm2.html">Italiano</a> /
      <a href="/en/3500-cm2.html">English</a>
    </p>
  </noscript>
</body>
</html>

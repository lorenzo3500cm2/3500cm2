<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostre</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap');

        body {
            font-family: 'Libre Baskerville', serif;
            margin: 0;
            padding: 0;
            padding-top: 86px;
            background-color: #fff;
            font-size: 1.5rem;
            color: #000;
            overflow-x: hidden;
        }

        /* Barra fissa in alto */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            background-color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        .page-title a {
            text-decoration: none;
            color: inherit;
        }

        .page-title a:hover {
            color: blue;
        }

        /* Menu sempre visibile */
        .menu {
            display: flex;
            gap: 22px;
            align-items: center;
            justify-content: flex-end;
            font-size: 1rem;
        }

        .menu a {
            text-decoration: none;
            color: #000;
            white-space: nowrap;
        }

        .menu a:hover {
            color: red;
        }

        .exhibitions-list {
            padding: 20px;
        }

        .exhibition {
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .exhibition a {
            font-weight: bold;
            text-decoration: none;
            color: #000;
        }

        .exhibition a:hover {
            color: red;
        }

        .exhibition span {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-top: 5px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body {
                padding-top: 120px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
                padding: 18px 20px;
            }

            .page-title {
                font-size: 2.2rem;
            }

            .menu {
                width: 100%;
                justify-content: flex-start;
                gap: 14px;
                flex-wrap: wrap;
                font-size: 0.9rem;
            }

            .exhibition {
                font-size: 1.4rem;
            }
        }
    </style>

    <script src="analytics.js"></script>
</head>

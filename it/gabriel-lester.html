<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Lester</title>

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Libre Baskerville', serif;
            margin: 0;
            padding: 0;
            padding-top: 86px;
            background-color: #fff;
            color: #000;
            position: relative;
            overflow-x: hidden;
        }

        /* Barra fissa in alto */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #fff;
            z-index: 2000;
            box-sizing: border-box;
        }

        .back-link {
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: #333;
            white-space: nowrap;
        }

        .back-link:visited {
            color: #333;
        }

        .back-link:hover {
            color: blue;
        }

        /* Menu orizzontale sempre visibile */
        .menu {
            display: flex;
            gap: 22px;
            align-items: center;
            justify-content: flex-end;
        }

        .menu a {
            text-decoration: none;
            color: #000;
            font-size: 1rem;
            white-space: nowrap;
        }

        .menu a:visited {
            color: #000;
        }

        .menu a:hover {
            text-decoration: underline;
            color: blue;
        }

        img {
            width: 100%;
            max-height: 90vh;
            object-fit: contain;
            display: block;
            margin: 20px auto;
        }

        .description {
            font-family: 'Libre Baskerville', serif;
            font-size: 1rem;
            text-align: left;
            margin: 20px;
            color: #333;
            line-height: 1.5;
        }

        .prev-artist,
        .next-artist {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: gray;
            text-decoration: none;
            z-index: 1500;
        }

        .prev-artist {
            left: 20px;
        }

        .next-artist {
            right: 20px;
        }

        .prev-artist:hover,
        .next-artist:hover {
            color: blue;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body {
                padding-top: 112px;
            }

            .header {
                align-items: flex-start;
                gap: 12px;
            }

            .back-link {
                font-size: 1.1rem;
                line-height: 1.3;
                max-width: 45%;
                white-space: normal;
            }

            .menu {
                flex-wrap: wrap;
                gap: 8px 14px;
                justify-content: flex-end;
                max-width: 55%;
            }

            .menu a {
                font-size: 0.85rem;
            }

            img {
                margin-top: 10px;
                max-height: 75vh;
            }

            .description {
                font-size: 0.9rem;
                margin: 20px;
            }

            .prev-artist,
            .next-artist {
                font-size: 1.6rem;
            }

            .prev-artist {
                left: 12px;
            }

            .next-artist {
                right: 12px;
            }
        }

        /* Mobile molto stretto */
        @media (max-width: 480px) {
            body {
                padding-top: 125px;
            }

            .header {
                padding: 18px 16px;
            }

            .back-link {
                font-size: 1rem;
                max-width: 42%;
            }

            .menu {
                max-width: 58%;
                gap: 7px 11px;
            }

            .menu a {
                font-size: 0.78rem;
            }

            img {
                max-height: 70vh;
            }
        }
    </style>

    <script src="analytics.js"></script>
</head>

<body>

    <div class="header">
        <a href="pagina.html" class="back-link">#61 Gabriel Lester</a>

        <nav class="menu">
            <a href="pagina.html">artisti</a>
            <a href="3500cm2.html">3500cm2</a>
            <a href="luoghi.html">luoghi</a>
            <a href="contatti.html">contatti</a>
        </nav>
    </div>

    <img src="gabriel-lester.jpg" alt="Gabriel Lester">

    <div class="description">
        #61 Gabriel Lester, <em>High Noon</em>, 2006, Blueroom Rialtosantambrogio, Roma.
    </div>

    <!-- Frecce per navigare tra le pagine -->
    <a href="alon-levin.html" class="prev-artist">&#8592;</a>
    <a href="h-h-lim.html" class="next-artist">&#8594;</a>

    <!-- Swipe su dispositivi mobili -->
    <script>
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let touchEndY = 0;

        document.addEventListener('touchstart', function(event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', function(event) {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const swipeDistanceX = touchEndX - touchStartX;
            const swipeDistanceY = touchEndY - touchStartY;
            const minSwipeDistance = 60;

            if (Math.abs(swipeDistanceX) < minSwipeDistance) return;

            if (Math.abs(swipeDistanceX) < Math.abs(swipeDistanceY)) return;

            if (swipeDistanceX > 0) {
                window.location.href = "alon-levin.html";
            } else {
                window.location.href = "h-h-lim.html";
            }
        }
    </script>

</body>
</html>

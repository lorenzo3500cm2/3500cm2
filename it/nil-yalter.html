            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            color: gray;
            text-decoration: none;
            z-index: 1500;
        }

        .prev-artist {
            left: 10px;
        }

        .next-artist {
            right: 10px;
        }

        .prev-artist:hover, 
        .next-artist:hover {
            color: black;
        }

        @media (max-width: 768px) {

                padding: 20px;
            }
